version: '3.8'

#THIS ADDS IN PERSISTENT STORAGE  SO THAT ITLL BE PRESENT WHEN THE DASHBOARD RESTARTS

services:
  app:
    build: ./app
    ports:
      - "5001:5000"
    labels:
      - "prometheus.scrape=true"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data: